<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <title>Login | Campus Lost & Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/login.js"></script>
    
</head>
<body>

<header>
    <div class="container">
        <h1 class="logo">Campus Lost & Found</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="items.html">Items</a></li>
                <li><a href="report.html">Report</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="login-register-container">

    <h2 style="margin: 30px 0;">Student Login</h2>

    <form id="loginForm" class="login-form">
        <div class="login-register-form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Your email" required>
        </div>

        <div class="login-register-form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Your password" required>
        </div>

        <button type="submit" class="btn primary">Login</button>

        <p style="margin-top: 15px;">New user? <a href="register.html">Register here</a></p>

        <p id="statusMessage" style="margin-top: 15px;"></p>
    </form>

</main>

</body>
</html>
