<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report Item | Campus Lost & Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="js/main.js"></script>
    <script defer src="js/report.js"></script>

</head>
<body>

<header>
    <div class="container">
        <h1 class="logo">Campus Lost & Found</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="items.html">Items</a></li>
                <li><a href="report.html" class="active">Report</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                <li id="loginNav"><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </div>
</header>
<main class="container report-form-container">

    <h2 style="margin: 30px 0;">Report Lost or Found Item</h2>

    <form id="reportForm" class="report-form" enctype="multipart/form-data">

        <div class="form-group">
            <label for="title">Item Title:</label>
            <input type="text" id="title" name="title" placeholder="Enter item title" required>
        </div>

        <div class="form-group">
            <label for="image">Upload Image (optional):</label>
            <input type="file" id="image" name="image" accept="image/*">
        </div>

        <div class="form-group">
            <label for="description">Description:</label>
            <textarea id="description" name="description" placeholder="Describe the item" required></textarea>
        </div>

        <div class="form-group">
            <label for="category">Category:</label>
            <select id="category" name="category" required>
                <option value="">Select</option>
                <option value="Lost">Lost</option>
                <option value="Found">Found</option>
            </select>
        </div>

        <div class="form-group">
            <label for="location">Location:</label>
            <input type="text" id="location" name="location" placeholder="Where item was lost/found" required>
        </div>

        <div class="form-group">
            <label for="date">Date:</label>
            <input type="date" id="date" name="date" required>
        </div>

        <div class="form-group">
            <label for="contact_info">Contact Info:</label>
            <input type="text" id="contact_info" name="contact_info" placeholder="Your email or phone" required>
        </div>

        <button type="submit" class="btn primary">Submit Report</button>

        <p id="statusMessage" class="status-message"></p>

    </form>

</main>

</body>
</html>
